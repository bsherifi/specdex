name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (Ubuntu)
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps for Tauri 2
        # Tauri 2 needs webkit2gtk + ancillary -dev packages even just to compile.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
          cache-workspaces: src-tauri

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  frontend:
    name: Frontend (Ubuntu)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.5.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  e2e:
    name: E2E (Ubuntu)
    runs-on: ubuntu-22.04
    needs: [rust, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux + WebDriver deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf \
            webkit2gtk-driver \
            xvfb

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
          cache-workspaces: src-tauri

      - name: Install tauri-driver
        run: cargo install tauri-driver --version "^0.1" --locked

      - uses: pnpm/action-setup@v4
        with:
          version: 9.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium

      - name: Build debug binary
        run: cargo build -p tauri_adapter --manifest-path src-tauri/Cargo.toml

      - name: Regenerate bindings + verify clean
        run: |
          pnpm bindings
          git diff --exit-code src/lib/bindings.ts || (
            echo 'src/lib/bindings.ts is stale. Run `pnpm bindings` and commit the result.';
            exit 1
          )

      - name: Run E2E under Xvfb
        run: xvfb-run --auto-servernum --server-args='-screen 0 1280x800x24' pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
